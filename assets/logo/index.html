<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Tech Logo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030507; /* Dark surrounding for presentation */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The SVG itself is responsive and will scale cleanly */
        .logo-container {
            width: 100%;
            max-width: 600px;
            height: auto;
            padding: 2rem;
        }
    </style>
</head>
<body>

<div class="logo-container">
    <!-- STANDALONE SVG START -->
    <!-- You can copy everything from <svg> to </svg> to use as a raw .svg file -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
        <defs>
            <!-- Subtle neon glow filter for the main elements -->
            <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>

            <!-- Mint Green tech gradient for the V -->
            <linearGradient id="vGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#5EEAD4"/> <!-- Bright mint -->
                <stop offset="100%" stop-color="#10B981"/> <!-- Deep emerald -->
            </linearGradient>
        </defs>

        <!-- 1. Base Background -->
        <rect width="500" height="500" fill="#0A0F14"/>

        <!-- 2. Outer HUD Frame (Dashed) -->
        <rect x="40" y="40" width="420" height="420" fill="none" stroke="#122422" stroke-dasharray="6 6"
              stroke-width="1.5"/>

        <!-- 3. Corner Orange Accents & Blips -->
        <!-- Top Left -->
        <path d="M 50 100 L 50 50 L 100 50" fill="none" stroke="#E95D35" stroke-width="2"/>
        <circle cx="70" cy="70" r="3" fill="#E95D35"/>
        <!-- Bottom Right -->
        <path d="M 450 400 L 450 450 L 400 450" fill="none" stroke="#E95D35" stroke-width="2"/>
        <circle cx="430" cy="430" r="3" fill="#E95D35"/>

        <!-- 4. Concentric Background Rings -->
        <!-- Thick, faint background ring -->
        <circle cx="250" cy="250" r="170" fill="none" stroke="#0D1F1D" stroke-width="40"/>
        <!-- Thin outer ring with radar ticks -->
        <circle cx="250" cy="250" r="210" fill="none" stroke="#102b28" stroke-width="2" stroke-dasharray="3 10.18"/>
        <!-- Thin inner ring -->
        <circle cx="250" cy="250" r="120" fill="none" stroke="#153A36" stroke-width="1"/>

        <!-- 5. Geometric Hexagons -->
        <!-- Outer Hexagon -->
        <polygon points="250,70 405.9,160 405.9,340 250,430 94.1,340 94.1,160" fill="none" stroke="#122A28"
                 stroke-width="2"/>
        <!-- Inner Hexagon -->
        <polygon points="250,110 371.2,180 371.2,320 250,390 128.8,320 128.8,180" fill="none" stroke="#18423D"
                 stroke-width="1"/>

        <!-- 6. Precision Crosshairs (Stopped before hitting the logo) -->
        <!-- Top -->
        <line x1="250" y1="40" x2="250" y2="140" stroke="#18423D" stroke-width="1.5"/>
        <!-- Bottom -->
        <line x1="250" y1="360" x2="250" y2="460" stroke="#18423D" stroke-width="1.5"/>
        <!-- Left -->
        <line x1="40" y1="250" x2="140" y2="250" stroke="#18423D" stroke-width="1.5"/>
        <!-- Right -->
        <line x1="360" y1="250" x2="460" y2="250" stroke="#18423D" stroke-width="1.5"/>

        <!-- 7. Center Targeting Brackets -->
        <path d="M 140 170 L 140 140 L 170 140" fill="none" stroke="#18423D" stroke-width="2"/>
        <path d="M 330 140 L 360 140 L 360 170" fill="none" stroke="#18423D" stroke-width="2"/>
        <path d="M 360 330 L 360 360 L 330 360" fill="none" stroke="#18423D" stroke-width="2"/>
        <path d="M 170 360 L 140 360 L 140 330" fill="none" stroke="#18423D" stroke-width="2"/>

        <!-- 8. The Main "V" Logo Mark & Underline -->
        <!-- Scaled up and mathematically centered using transform -->
        <g transform="translate(250, 250) scale(1.8) translate(-250, -250)">
            <path d="M 170 170
                         L 250 330
                         L 330 170
                         L 290 170
                         L 250 250
                         L 210 170
                         Z"
                  fill="url(#vGradient)"
                  filter="url(#neonGlow)"/>

            <!-- 9. Orange Tech Underline Accent (with a cyber cut-out gap) -->
            <line x1="180" y1="350" x2="245" y2="350" stroke="#E95D35" stroke-width="3" filter="url(#neonGlow)"/>
            <line x1="255" y1="350" x2="320" y2="350" stroke="#E95D35" stroke-width="3" filter="url(#neonGlow)"/>
        </g>
    </svg>
    <!-- STANDALONE SVG END -->
</div>

</body>
</html>
